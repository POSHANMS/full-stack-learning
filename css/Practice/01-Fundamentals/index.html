<head>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .box {
      width: 200px;
      max-width: 150px;
      height: 200px;
      max-height: 150px;
      background-color: lightgreen;
    }
  </style>
</head>
<body>
  <h1 id="title">Learning about CSS</h1>
  <h2 class="subheading">Example subheading</h2>

  <p>Example paragragh element</p>
  <p>Another example paragraph element</p>

  <!--Inline CSS-->
  <p style="color: green">This is an inline-styled paragraph.</p>
  <div class="box"></div>

  <!--Descendant Combinator-->
  <figure>
    <img
      src="https://cdn.freecodecamp.org/curriculum/cat-photo-app/relaxing-cat.jpg"
      alt="Relaxing Cat"
    />
    <figcaption>A relaxing cat with a border</figcaption>
  </figure>
